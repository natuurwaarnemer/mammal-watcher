<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#02040A"/>

  <!-- Radar circle -->
  <circle cx="256" cy="256" r="180" fill="#02040A" stroke="#1aff7a" stroke-width="6"/>

  <!-- Radar rings -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#1aff7a" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="256" r="60"  fill="none" stroke="#1aff7a" stroke-width="2" opacity="0.5"/>

  <!-- Crosshair lines -->
  <line x1="256" y1="96"  x2="256" y2="416" stroke="#1aff7a" stroke-width="2" opacity="0.4"/>
  <line x1="96"  y1="256" x2="416" y2="256" stroke="#1aff7a" stroke-width="2" opacity="0.4"/>

  <!-- Radar sweep wedge -->
  <defs>
    <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1aff7a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1aff7a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <path d="
    M256,256
    L120,340
    A180,180 0 0,0 340,120
    Z"
    fill="url(#sweepGrad)" opacity="0.9"/>

  <!-- Badger silhouette (stylized) -->
  <g transform="translate(0,-10)">
    <!-- Body -->
    <path d="
      M145,286
      C165,255 225,236 286,238
      C332,240 366,256 386,281
      C374,301 348,318 316,327
      C269,340 208,338 164,323
      C152,312 146,300 145,286 Z"
      fill="#e8e8e8" stroke="#d6d6d6" stroke-width="3"/>

    <!-- Head -->
    <path d="
      M292,238
      C320,220 350,220 374,236
      C390,248 397,266 392,283
      C368,286 338,286 313,280
      C301,270 295,255 292,238 Z"
      fill="#dcdcdc" stroke="#d0d0d0" stroke-width="3"/>

    <!-- Head stripe -->
    <path d="
      M337,228
      C345,229 351,233 355,241
      C353,252 351,263 350,275
      C343,278 336,277 330,274
      C330,261 332,248 337,228 Z"
      fill="#ffffff"/>

    <!-- Snout -->
    <path d="
      M374,256
      C385,258 392,265 394,274
      C387,275 379,274 371,272
      C369,266 370,261 374,256 Z"
      fill="#f6f6f6"/>

    <!-- Ear -->
    <circle cx="334" cy="228" r="9" fill="#efefef"/>
  </g>
</svg>
