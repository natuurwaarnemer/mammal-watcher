<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MammalRadar Review</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <style>
      :root {
        --bg: #02040a;
        --surface: #0d0f14;
        --line: #1a1f1a;
        --text: #e8e8e8;
        --muted: #9aa09b;
        --accent: #1aff7a;
        --danger: #ff4d4f;
        --warn: #ffb347;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #111 0%, var(--bg) 45%);
        color: var(--text);
      }
      .page { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .brand { display: flex; align-items: center; gap: 0.75rem; font-weight: 700; }
      .logo {
        width: 40px; height: 40px; border-radius: 50%;
        border: 1px solid #1e1e1e; background: #050505; padding: 0.2rem;
      }
      nav a {
        color: var(--muted);
        text-decoration: none;
        margin-left: 0.8rem;
        padding-bottom: 0.2rem;
      }
      nav a.active { color: var(--accent); border-bottom: 1px solid var(--accent); }

      .stats {
        background: linear-gradient(180deg, #131313 0%, var(--surface) 100%);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.9rem 1rem;
        margin-bottom: 1rem;
      }
      .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
      .tab {
        border: 1px solid var(--line);
        background: #11151e;
        color: var(--text);
        border-radius: 999px;
        padding: 0.45rem 0.9rem;
        cursor: pointer;
      }
      .tab.active { border-color: var(--accent); color: var(--accent); }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 0.9rem;
      }
      .card {
        background: linear-gradient(180deg, #131313 0%, var(--surface) 100%);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.9rem;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }
      .card.done { opacity: 0.3; transform: scale(0.98); }
      .meta { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 0.2rem 0.6rem;
        font-size: 0.82rem;
        margin-top: 0.5rem;
      }
      .badge.high { background: rgba(26, 255, 122, 0.18); color: var(--accent); }
      .badge.mid { background: rgba(255, 179, 71, 0.18); color: var(--warn); }
      .badge.low { background: rgba(255, 77, 79, 0.18); color: var(--danger); }
      audio { width: 100%; margin-top: 0.8rem; }
      .actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
      .btn {
        border: 0;
        border-radius: 10px;
        padding: 0.5rem 0.7rem;
        cursor: pointer;
        color: #fff;
        font-weight: 600;
      }
      .btn.ok { background: #138a4a; }
      .btn.no { background: #c23234; }
      .btn.alt { background: #3857d6; }
      .btn.ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--line);
      }
      .correct-panel {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.75rem;
        flex-wrap: wrap;
      }
      .correct-panel select {
        flex: 1 1 220px;
        min-width: 0;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #11151e;
        color: var(--text);
        padding: 0.55rem 0.65rem;
      }
      .empty {
        text-align: center;
        color: var(--muted);
        padding: 2rem 0.5rem;
      }
      @media (max-width: 640px) {
        .topbar { align-items: flex-start; flex-direction: column; }
        nav a { margin-left: 0; margin-right: 0.8rem; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div class="brand">
          <img class="logo" src="assets/logo.svg" alt="MammalRadar" />
          <span>MammalRadar</span>
        </div>
        <nav>
          <a href="/">Home</a>
          <a class="active" href="/review">Review</a>
        </nav>
      </header>

      <section class="stats" id="stats">0 te beoordelen | 0 bevestigd | 0 afgewezen | 0 gecorrigeerd</section>

      <section class="tabs">
        <button class="tab active" data-filter="all">Alle</button>
        <button class="tab" data-filter="needs_review">Ter beoordeling</button>
        <button class="tab" data-filter="confirmed">Bevestigd</button>
      </section>

      <section id="cards" class="grid"></section>
      <div id="empty" class="empty" hidden>Geen detecties ter beoordeling 🎉</div>
    </main>

    <script>
      const cardsEl = document.getElementById("cards");
      const emptyEl = document.getElementById("empty");
      const statsEl = document.getElementById("stats");
      const tabs = [...document.querySelectorAll(".tab")];
      let currentFilter = "all";
      let detections = [];
      let speciesOptions = null;

      const escapeHtml = (value) =>
        String(value ?? "").replace(/[&<>"']/g, (char) => (
          { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char] || char
        ));

      const encodePath = (path) =>
        String(path || "")
          .split("/")
          .filter(Boolean)
          .map((segment) => encodeURIComponent(segment))
          .join("/");

      const normalizeSpeciesSlug = (value) =>
        String(value || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "_")
          .replace(/[^a-z0-9_]/g, "_")
          .replace(/_+/g, "_")
          .replace(/^_+|_+$/g, "");

      const fmtDate = (value) => {
        const dt = new Date(value);
        return Number.isNaN(dt.getTime()) ? value || "onbekend" : dt.toLocaleString("nl-NL");
      };

      const confidenceClass = (score) => {
        if (score > 0.7) return "high";
        if (score >= 0.4) return "mid";
        return "low";
      };

      const filteredDetections = () => {
        if (currentFilter === "needs_review") {
          return detections.filter((item) => item.source === "needs_review");
        }
        if (currentFilter === "confirmed") {
          return detections.filter(
            (item) => item.source === "clips" || item.review_status === "confirmed"
          );
        }
        return detections;
      };

      const buildAudioUrl = (item) => {
        if (item.audio_url) return item.audio_url;
        if (!item.clip_path) return "";
        return `/api/audio/${encodePath(item.clip_path)}`;
      };

      const ensureSpeciesLoaded = async () => {
        if (speciesOptions) return speciesOptions;
        const resp = await fetch("/api/species");
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const species = await resp.json();
        speciesOptions = species
          .map((item) => ({
            scientific: item.scientific,
            nl: item.nl,
            slug: item.slug || normalizeSpeciesSlug(item.scientific),
          }))
          .sort((a, b) => a.nl.localeCompare(b.nl, "nl"));
        return speciesOptions;
      };

      const markDone = async (item, card) => {
        card.classList.add("done");
        setTimeout(async () => {
          detections = detections.filter((row) => row.clip_path !== item.clip_path);
          render();
          await loadStats();
        }, 1000);
      };

      const render = () => {
        const rows = filteredDetections();
        cardsEl.innerHTML = "";
        emptyEl.hidden = rows.length > 0;
        if (!rows.length) {
          return;
        }
        rows.forEach((item, idx) => {
          const scientific = item.species_scientific || "Onbekend";
          const nl = item.species_nl || scientific;
          const confidence = Number(item.confidence || 0);
          const audioUrl = buildAudioUrl(item);
          const card = document.createElement("article");
          card.className = "card";
          card.innerHTML = `
            <h3>${escapeHtml(nl)}</h3>
            <div class="meta"><em>${escapeHtml(scientific)}</em></div>
            <span class="badge ${confidenceClass(confidence)}">confidence ${confidence.toFixed(2)}</span>
            <div class="meta">${escapeHtml(fmtDate(item.timestamp))}</div>
            <audio controls preload="none" src="${audioUrl}"></audio>
            <div class="actions">
              <button class="btn ok" ${item.source !== "needs_review" ? "disabled" : ""}>✅ Correct</button>
              <button class="btn no" ${item.source !== "needs_review" ? "disabled" : ""}>❌ False positive</button>
              <button class="btn alt" ${item.source !== "needs_review" ? "disabled" : ""}>🔄 Verkeerde soort</button>
            </div>
            <div class="correct-panel" hidden>
              <select aria-label="Kies de juiste soort">
                <option value="">Kies de juiste soort…</option>
              </select>
              <button class="btn alt" disabled>Opslaan</button>
              <button class="btn ghost" type="button">Annuleren</button>
            </div>
          `;

          const confirmBtn = card.querySelector(".btn.ok");
          const rejectBtn = card.querySelector(".btn.no");
          const correctBtn = card.querySelector(".actions .btn.alt");
          const saveBtn = card.querySelector(".correct-panel .btn.alt");
          const cancelBtn = card.querySelector(".btn.ghost");
          const correctionPanel = card.querySelector(".correct-panel");
          const select = card.querySelector("select");
          confirmBtn?.addEventListener("click", () => review(item, "confirm", card, idx));
          rejectBtn?.addEventListener("click", () => review(item, "reject", card, idx));
          correctBtn?.addEventListener("click", async () => {
            try {
              correctBtn.disabled = true;
              const species = await ensureSpeciesLoaded();
              if (select.options.length <= 1) {
                species.forEach((option) => {
                  const el = document.createElement("option");
                  el.value = option.slug;
                  el.textContent = `${option.nl} — ${option.scientific}`;
                  select.appendChild(el);
                });
              }
              correctionPanel.hidden = false;
            } catch (error) {
              console.error(error);
              alert("Soortenlijst laden mislukt.");
            } finally {
              correctBtn.disabled = false;
            }
          });
          select?.addEventListener("change", () => {
            saveBtn.disabled = !select.value;
          });
          saveBtn?.addEventListener("click", () => review(item, "correct", card, idx, { corrected_species: select.value }));
          cancelBtn?.addEventListener("click", () => {
            select.value = "";
            saveBtn.disabled = true;
            correctionPanel.hidden = true;
          });
          cardsEl.appendChild(card);
        });
      };

      const review = async (item, action, card, _idx, extraPayload = {}) => {
        try {
          const resp = await fetch(`/api/${action}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ clip_path: item.clip_path, ...extraPayload }),
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          await markDone(item, card);
        } catch (error) {
          console.error(error);
          alert("Actie mislukt, probeer opnieuw.");
        }
      };

      const loadStats = async () => {
        try {
          const resp = await fetch("/api/stats");
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          statsEl.textContent = `${data.needs_review || 0} te beoordelen | ${data.confirmed || 0} bevestigd | ${data.rejected || 0} afgewezen | ${data.corrected || 0} gecorrigeerd`;
        } catch (error) {
          console.error(error);
          statsEl.textContent = "API niet bereikbaar";
        }
      };

      const loadDetections = async () => {
        const resp = await fetch("/api/detections?limit=100");
        detections = await resp.json();
        render();
      };

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          currentFilter = tab.dataset.filter;
          render();
        });
      });

      Promise.all([loadStats(), loadDetections()]).catch((error) => {
        console.error(error);
        emptyEl.hidden = false;
        emptyEl.textContent = "API niet bereikbaar.";
      });
    </script>
  </body>
</html>
