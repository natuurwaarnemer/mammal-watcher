logLevel: info
api: yes
apiAddress: 127.0.0.1:9997

paths:
  mic:
    # Pas het IP-adres aan naar het adres van jouw ESP32-microfoon.
    # Standaard: 192.168.2.20 (ESP32-C6 met I2S mic, firmware ESP32 RTSP Mic v1.3.0)
    source: rtsp://192.168.2.20:8554/audio
    sourceProtocol: tcp
    sourceOnDemand: yes
    sourceOnDemandStartTimeout: 10s
    sourceOnDemandCloseAfter: 10s
