services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mammal-mediamtx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  rtsp-bridge:
    image: linuxserver/ffmpeg:latest
    container_name: mammal-rtsp-bridge
    restart: always
    network_mode: host
    depends_on:
      - mediamtx
    entrypoint:
      - ffmpeg
      - -rtsp_transport
      - tcp
      - -reconnect
      - "1"
      - -reconnect_at_eof
      - "1"
      - -reconnect_streamed
      - "1"
      - -reconnect_delay_max
      - "30"
      - -timeout
      - "5000000"
      - -i
      - ${ESP32_RTSP_URL}
      - -c
      - copy
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://localhost:8554/mic

  mammal-watcher:
    build: .
    container_name: mammal-watcher
    restart: unless-stopped
    network_mode: host
    depends_on:
      - mediamtx
      - rtsp-bridge
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./species_mammals_nl.csv:/app/species_mammals_nl.csv:ro
    environment:
      - PYTHONUNBUFFERED=1
