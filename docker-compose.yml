services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mammal-mediamtx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  rtsp-bridge:
    image: linuxserver/ffmpeg:latest
    container_name: mammal-rtsp-bridge
    restart: always
    network_mode: host
    depends_on:
      - mediamtx
    healthcheck:
      test: ["CMD", "ffprobe", "-rtsp_transport", "tcp", "-i", "rtsp://localhost:8554/mic", "-show_streams", "-select_streams", "a", "-of", "json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    entrypoint:
      - ffmpeg
      - -rtsp_transport
      - tcp
      - -i
      - ${ESP32_RTSP_URL}
      - -c
      - copy
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://localhost:8554/mic

  mammal-watcher:
    build: .
    container_name: mammal-watcher
    restart: unless-stopped
    network_mode: host
    depends_on:
      mediamtx:
        condition: service_started
      rtsp-bridge:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./species_mammals_nl.csv:/app/species_mammals_nl.csv:ro
      - ./models:/app/models:ro
      - ./feedback:/app/feedback
      - ./clips:/app/clips
    environment:
      - PYTHONUNBUFFERED=1

  review-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mammal-review-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./clips:/app/clips
      - ./feedback:/app/feedback
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - mammal-net

  mammalradar-web:
    image: nginx:alpine
    container_name: mammalradar-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - review-api
    networks:
      - mammal-net

networks:
  mammal-net:
    driver: bridge
