watch:
  snippet_dir: /home/pi/BirdNET-Pi/BirdSongs/Extracted
  file_extensions: [".wav", ".flac"]

n8n:
  # Pas dit aan naar het adres van jouw n8n-installatie
  webhook_url: "http://hp630.local:5678/webhook/mammal-detection"
  timeout_s: 10

classifier:
  model: "stub"   # later: yamnet | perch | custom_cnn
  min_confidence: 0.4
  # Classifier-confidence >= tier1_threshold → tier 1 (zeldzaam, directe alert)
  tier1_threshold: 0.75
  # Classifier-confidence >= tier2_threshold → tier 2 (gewoon-interessant)
  tier2_threshold: 0.5

species_csv: ./species_mammals_nl.csv

logging:
  level: INFO
