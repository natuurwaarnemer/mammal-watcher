rtsp:
  url: rtsp://localhost:8554/mic
  reconnect_initial_s: 1
  reconnect_max_s: 30

audio:
  target_sample_rate: 48000
  window_seconds: 5.0
  hop_seconds: 5.0

classifier:
  model: stub
  min_confidence: 0.4
  tier1_threshold: 0.75
  tier2_threshold: 0.5

mqtt:
  enabled: true
  broker: homeassistant
  port: 1883
  username: birdnet
  password: secret
  topic_detections: mammal/detection
  topic_status: mammal/status
  ha_discovery: true

n8n:
  enabled: false
  webhook_url: http://localhost:5678/webhook/mammal-detection
  timeout_s: 10

species_csv: ./species_mammals_nl.csv

logging:
  level: INFO
